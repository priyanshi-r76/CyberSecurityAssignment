<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <script>

        function validateForm() {

            let name = document.forms["studentForm"]["name"].value;
            let email = document.forms["studentForm"]["email"].value;
            let password = document.forms["studentForm"]["password"].value;
            let mobile = document.forms["studentForm"]["mobile"].value;

            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (name == "") {
                alert("Name cannot be empty");
                return false;
            }

            if (!emailPattern.test(email)) {
                alert("Invalid email format");
                return false;
            }

            if (password.length < 8) {
                alert("Password must contain at least 8 characters");
                return false;
            }

            if (mobile.length != 10 || isNaN(mobile)) {
                alert("Mobile number must be 10 digits");
                return false;
            }

            alert("Registration Successful");
            return true;
        }

    </script>
</head>

<body>

    <h2>Student Registration Form</h2>

    <form name="studentForm" onsubmit="return validateForm()">

        <label>Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="text" name="email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <label>Mobile Number:</label><br>
        <input type="text" name="mobile"><br><br>

        <input type="submit" value="Register">

    </form>

</body>
</html>
